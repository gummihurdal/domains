<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#1a0e1c">
<title>·</title>
<style>
  :root{--paper:#f5f0e6;--ink:#2a1810;--ink-soft:#5a4a3e;--plum:#6c3a5c;--plum-deep:#4e2945;--gold:#b07b3e;--gold-ink:#8a5a24;--dark:#1a0e1c;--ember:#8a2a3a;--moss:#5a6b4a}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Newsreader',Georgia,serif;background:var(--dark);color:#f4ead6;padding:18px;min-height:100vh}
  h1{font-family:'Fraunces','Newsreader',serif;font-size:1.3rem;font-weight:500;letter-spacing:.02em;margin-bottom:2px}
  .sub{color:rgba(244,234,214,.5);font-size:.82rem;margin-bottom:18px}
  .me{background:rgba(244,234,214,.05);border:1px solid rgba(244,234,214,.12);border-radius:10px;padding:12px 16px;margin-bottom:18px;font-size:.9rem}
  .me b{color:var(--gold)}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
  @media(max-width:560px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat{background:rgba(244,234,214,.05);border:1px solid rgba(244,234,214,.12);border-radius:10px;padding:14px;text-align:center}
  .stat .n{font-family:'Fraunces',serif;font-size:1.8rem;color:var(--gold);line-height:1}
  .stat .l{font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(244,234,214,.5);margin-top:6px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center}
  .btn{appearance:none;cursor:pointer;font:inherit;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(244,234,214,.7);background:rgba(244,234,214,.05);border:1px solid rgba(244,234,214,.16);border-radius:999px;padding:8px 16px;transition:all .2s}
  .btn:hover{color:#fff;border-color:var(--gold)}
  .btn.active{color:var(--dark);background:var(--gold);border-color:var(--gold)}
  #search{flex:1;min-width:140px;font:inherit;font-size:.85rem;color:#f4ead6;background:rgba(244,234,214,.05);border:1px solid rgba(244,234,214,.16);border-radius:999px;padding:8px 16px}
  .table-wrap{overflow-x:auto;border:1px solid rgba(244,234,214,.1);border-radius:10px}
  table{width:100%;border-collapse:collapse;font-size:.82rem}
  th{text-align:left;padding:10px 12px;font-family:'Fraunces',serif;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(244,234,214,.5);border-bottom:1px solid rgba(244,234,214,.12);white-space:nowrap}
  td{padding:9px 12px;border-bottom:1px solid rgba(244,234,214,.06);white-space:nowrap}
  tr:hover td{background:rgba(244,234,214,.03)}
  .loading{text-align:center;color:rgba(244,234,214,.4);padding:30px}
  .pg{font-size:.7rem;color:var(--plum);background:rgba(108,58,92,.18);padding:2px 8px;border-radius:6px}
  .upd{font-size:.7rem;color:rgba(244,234,214,.4);margin-top:10px;text-align:right}
</style>
</head>
<body>
<h1>Visitors</h1>
<div class="sub">domains.azurenexus.com</div>
<div class="me">Your IP: <b id="my-ip">…</b> &nbsp;·&nbsp; <span id="my-loc">…</span></div>
<div class="stats">
  <div class="stat"><div class="n" id="s-total">–</div><div class="l">Total visits</div></div>
  <div class="stat"><div class="n" id="s-today">–</div><div class="l">Today</div></div>
  <div class="stat"><div class="n" id="s-countries">–</div><div class="l">Countries</div></div>
  <div class="stat"><div class="n" id="s-cities">–</div><div class="l">Cities</div></div>
</div>
<div class="controls">
  <button class="btn active" onclick="setFilter('all',this)">All</button>
  <button class="btn" onclick="setFilter('domains:landing',this)">Landing</button>
  <button class="btn" onclick="setFilter('domains:live',this)">Live</button>
  <button class="btn" onclick="setFilter('domains:song-moi-non-plus',this)">Moi non plus</button>
  <button class="btn" onclick="setFilter('domains:song-msv',this)">Mont Sainte-Victoire</button>
  <input id="search" placeholder="Search IP, city, country…" oninput="renderTable()">
</div>
<div class="controls">
  <button class="btn" onclick="selfTest()">Self-test</button>
  <button class="btn" id="ownerBtn" onclick="toggleOwner()">…</button>
</div>
<pre id="diag" hidden style="white-space:pre-wrap;font:12px/1.6 ui-monospace,SFMono-Regular,Menlo,monospace;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:12px 14px;margin:0 0 14px;"></pre>
<div class="table-wrap">
  <table>
    <thead><tr><th>#</th><th>Flag</th><th>IP</th><th>Country</th><th>City</th><th>Region</th><th>ISP</th><th>Page</th><th>Time</th></tr></thead>
    <tbody id="tbody"><tr><td colspan="9" class="loading">Loading…</td></tr></tbody>
  </table>
</div>
<div class="upd" id="upd"></div>
<script>
try{ if(localStorage.getItem('owner-optout')!=='1') localStorage.setItem('owner','1'); }catch(e){}
const SB='https://mjphpctvuxmbjhmcscoj.supabase.co',KEY='sb_publishable_MDPfXyMjG0eadmvp7uoqdg_EHwj4Alm';
let allLogs=[], filterPage='all';
function flag(code){ if(!code)return '\uD83C\uDF10'; try{return String.fromCodePoint(...[...code.toUpperCase()].map(c=>0x1F1E6-65+c.charCodeAt(0)));}catch(e){return '\uD83C\uDF10';} }
function timeAgo(ts){const d=(Date.now()-new Date(ts))/1000;if(d<60)return Math.floor(d)+'s ago';if(d<3600)return Math.floor(d/60)+'m ago';if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago';}
function pgLabel(p){return (p||'').replace('domains:','');}
function setFilter(f,btn){filterPage=f;document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTable();}
function renderTable(){
  const q=document.getElementById('search').value.toLowerCase();
  let rows=allLogs.filter(r=>{
    const mp=filterPage==='all'||r.page===filterPage;
    const mq=!q||[r.ip,r.country,r.city,r.region,r.org].join(' ').toLowerCase().includes(q);
    return mp&&mq;
  });
  const tb=document.getElementById('tbody');
  if(!rows.length){tb.innerHTML='<tr><td colspan="9" class="loading">No visits yet.</td></tr>';return;}
  tb.innerHTML=rows.map((r,i)=>'<tr><td>'+(i+1)+'</td><td>'+flag(r.country_code)+'</td><td>'+(r.ip||'—')+'</td><td>'+(r.country||'—')+'</td><td>'+(r.city||'—')+'</td><td>'+(r.region||'—')+'</td><td>'+(r.org||'—')+'</td><td><span class="pg">'+pgLabel(r.page)+'</span></td><td>'+timeAgo(r.visited_at)+'</td></tr>').join('');
}
async function load(){
  try{
    const res=await fetch(SB+'/rest/v1/visitor_logs?select=*&page=like.domains:*&order=visited_at.desc&limit=1000',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
    allLogs=await res.json();
    document.getElementById('s-total').textContent=allLogs.length;
    const today=new Date().toDateString();
    document.getElementById('s-today').textContent=allLogs.filter(r=>new Date(r.visited_at).toDateString()===today).length;
    document.getElementById('s-countries').textContent=new Set(allLogs.map(r=>r.country).filter(Boolean)).size;
    document.getElementById('s-cities').textContent=new Set(allLogs.map(r=>r.city).filter(Boolean)).size;
    document.getElementById('upd').textContent='Updated '+new Date().toLocaleTimeString();
    renderTable();
  }catch(e){document.getElementById('tbody').innerHTML='<tr><td colspan="9" class="loading">Error loading.</td></tr>';}
}
fetch('https://ipapi.co/json/').then(r=>r.json()).then(d=>{
  document.getElementById('my-ip').textContent=d.ip||'—';
  document.getElementById('my-loc').textContent=[d.city,d.country_name].filter(Boolean).join(', ')||'—';
  try{ if(d.ip&&localStorage.getItem('owner-optout')!=='1') localStorage.setItem('owner-ip',d.ip); }catch(e){}
}).catch(()=>{});
async function probe(url){
  try{
    const r = await fetch(url,{cache:'no-store'});
    if(!r.ok) return 'HTTP '+r.status;
    const d = await r.json();
    return d && d.ip ? 'OK \u2014 '+d.ip : 'reachable, but no IP returned';
  }catch(e){ return 'BLOCKED / unreachable'; }
}
async function selfTest(){
  const out = document.getElementById('diag');
  out.hidden = false; out.textContent = 'Running\u2026';
  const L = [];
  let own; try{ own = localStorage.getItem('owner')==='1'; }catch(e){ own = null; }
  L.push('Owner flag here : ' + (own===null ? 'localStorage blocked' : own ? 'ON \u2014 visits from THIS browser are not logged' : 'off \u2014 visits are logged'));
  L.push('ipapi.co        : ' + await probe('https://ipapi.co/json/'));
  L.push('ipwho.is (bkup) : ' + await probe('https://ipwho.is/'));
  try{
    const r = await fetch(SB+'/rest/v1/visitor_logs?select=id&limit=1',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
    L.push('Supabase reach  : ' + (r.ok ? 'OK (endpoint reachable)' : 'HTTP '+r.status));
  }catch(e){ L.push('Supabase reach  : BLOCKED / unreachable'); }
  L.push('');
  L.push('Both geo lines blocked = city/ISP unknown, visit still logged as "(geo unavailable)".');
  L.push('Supabase line blocked  = nothing can be logged from this network.');
  L.push('This dashboard is read-only: it never writes or deletes anything.');
  out.textContent = L.join('\n');
}
function paintOwner(){
  let on=false; try{ on = localStorage.getItem('owner')==='1'; }catch(e){}
  const b=document.getElementById('ownerBtn');
  if(b) b.textContent = on ? 'This browser: excluded' : 'This browser: counted';
}
function toggleOwner(){
  let on=false; try{ on = localStorage.getItem('owner')==='1'; }catch(e){}
  try{
    if(on){ localStorage.setItem('owner-optout','1'); localStorage.removeItem('owner'); localStorage.removeItem('owner-ip'); }
    else  { localStorage.removeItem('owner-optout'); localStorage.setItem('owner','1'); }
  }catch(e){}
  paintOwner();
}
paintOwner();
load(); setInterval(load,30000);
</script>
</body>
</html>
