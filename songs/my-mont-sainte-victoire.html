<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Mont Sainte-Victoire — Azurenexus</title>
<meta name="description" content="My Mont Sainte-Victoire — a song. Cézanne painted the same mountain more than sixty times. This is about finding yours.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --night: #0E1628;
    --paper: #F5F0E6;
    --song: #B8956A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--night);
    color: var(--paper);
    font-family: 'Newsreader', Georgia, serif;
    font-size: 17px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .wrap {
    max-width: 46rem;
    margin: 0 auto;
    padding: 0 2rem;
    width: 100%;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  @media (max-width: 640px) { .wrap { padding: 0 1.4rem; } }

  header { padding: 3.5rem 0 2.2rem; }

  .kicker {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(245, 240, 230, 0.5);
    margin-bottom: 1.1rem;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-variation-settings: 'opsz' 144;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(2.1rem, 6.5vw, 3.4rem);
    line-height: 1.05;
    letter-spacing: -0.025em;
  }

  .sub {
    font-size: 0.98rem;
    color: rgba(245, 240, 230, 0.62);
    margin-top: 0.9rem;
    max-width: 30rem;
  }

  .player {
    margin: 0 0 3rem;
    position: relative;
  }

  video {
    display: block;
    width: 100%;
    background: #000;
    box-shadow: 0 1.4rem 3.5rem rgba(0, 0, 0, 0.5);
    outline: 1px solid rgba(184, 149, 106, 0.25);
  }

  footer {
    padding: 1.6rem 0 2.4rem;
  }

  footer .inner {
    max-width: 46rem;
    margin: 0 auto;
    padding: 0 2rem;
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
    border-top: 1px solid rgba(245, 240, 230, 0.14);
    padding-top: 1.2rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(245, 240, 230, 0.45);
  }

  footer a {
    color: rgba(245, 240, 230, 0.45);
    text-decoration: none;
    transition: color 0.4s ease;
  }

  footer a:hover { color: var(--song); }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <div class="kicker">Songs · 01</div>
    <h1>My Mont Sainte-Victoire</h1>
    <p class="sub">
      Cézanne painted the same mountain more than sixty times.
      This is a song about finding yours.
    </p>
  </header>

  <div class="player">
    <video controls preload="metadata" playsinline>
      <source src="my-mont-sainte-victoire.mp4" type="video/mp4">
      Your browser does not support the video element.
    </video>
  </div>

</div>

<footer>
  <div class="inner">
    <a href="https://domains.azurenexus.com">← Collected Work</a>
    <span>Azurenexus · 2026</span>
  </div>
</footer>

</body>
</html>
