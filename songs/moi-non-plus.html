    outline: 1px solid rgba(184, 149, 106, 0.25);
    box-shadow: 0 1.4rem 3.5rem rgba(0, 0, 0, 0.55);

  audio {

  footer { padding: 1.6rem 0 2.4rem; }

    font-size: 0.6rem;

  footer a {
    color: rgba(245, 240, 230, 0.4);
    text-decoration: none;

  footer a:hover { color: var(--song); }
