name: Sync photos from pCloud
on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pillow pillow-heif cryptography
      - run: python sync/sync_photos.py
        env:
          PHOTOS_PASSWORD: ${{ secrets.PHOTOS_PASSWORD }}
      - name: Commit changes
        run: |
          git config user.name "photo-sync"
          git config user.email "actions@github.com"
          git add photos/
          if ! git diff --cached --quiet; then
            git commit -m "Sync photos from pCloud"
            git push
            # workflow-made pushes don't trigger other workflows — dispatch the deploy explicitly
            curl -s -X POST \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches" \
              -d '{"ref":"main"}'
          fi
