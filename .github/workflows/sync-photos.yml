name: Sync photos from pCloud
on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pillow cryptography
      - run: python sync/sync_photos.py
        env:
          PHOTOS_PASSWORD: ${{ secrets.PHOTOS_PASSWORD }}
      - name: Commit changes
        run: |
          git config user.name "photo-sync"
          git config user.email "actions@github.com"
          git add photos/
          git diff --cached --quiet || git commit -m "Sync photos from pCloud"
          git push
